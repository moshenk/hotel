<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莫斯康_酒店后台管理系统</title>
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <h1>莫斯康_酒店后台管理系统</h1>
            <p>v1.0.0</p>
        </div>
        <ul id="sidebarMenu">
            <li class="active" data-page="home">首页</li>
            <li data-page="checkin">入住管理</li>
            <li data-page="room">客房管理</li>
            <li data-page="status">房态面板</li>
            <li data-page="finance">财务明细</li>
            <!-- 增加ID -->
            <li id="menuEmployee" data-page="employee">员工管理</li>
        </ul>
    </div>

    <div class="main">
        <div class="top-nav">
            <div class="tabs">
            </div>
            <div class="user-info">
                <div class="avatar">a</div>
                <span id="username">admin</span>
            </div>
        </div>

        <div class="content" id="mainContent">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            const user = JSON.parse(localStorage.getItem('hotel_user')) || {};
            const menu = document.getElementById('menuEmployee');
            if(user.role === 'common'){
            menu.style.display = 'none';
            }
        })
    </script>

    <script src="./js/index.js"></script>
    <script src="./js/embroider/shouye.js"></script>
    <script src="./js/embroider/ruzhu.js"></script>
    <script src="./js/embroider/kefang.js"></script>
    <script src="./js/embroider/fangtai.js"></script>
    <script src="./js/embroider/caiwu.js"></script>
    <script src="./js/embroider/enroll.js"></script>

</body>
</html>
